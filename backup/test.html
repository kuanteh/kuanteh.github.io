<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>test</title>
        <!-- import Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <style>
            body {
                margin: 0px;
                padding: 0px;
                color: white;
            }
            * {
                box-sizing: border-box; /* 右content-box 和border-box */
            }
            .slider {
                width: 600px;
                height: 450px;
                border: 2px solid black;
                display: flex;
                overflow: hidden; /*This is to hide the images that are outside of the border*/
                position: relative;
                margin: 60px auto;
            }
            @keyframes slider {
                0% {
                    transform: translateY(100%); /*translateX 是平行线（X），translateY 是垂直线（Y）*/
                    opacity: 1;
                }
                25% {
                    transform: translateY(0px);
                    opacity: 1;
                }
                50% {
                    transform: translateY(-100%);
                    opacity: 1;
                }
                /* 75.1%,75% {
                    transform: translate(100%);
                    opacity: 0;
                } */
                50.1%,
                100% {
                    transform: translateY(100%);
                    opacity: 1;
                }
            }
            .slider img {
                animation-name: slider;
                animation-duration: 5s;
                animation-iteration-count: infinite;
                position: absolute;
                top: 0px;
                left: 0px;
            }
            .slider img:nth-child(2) {
                animation-delay: 1.25s; /* based on animation-duration 有几秒，然后才除有how many images，比如duration 有 5s,so have 4 child ,so 5/4=1.25 */
                opacity: 0;
            }
            .slider img:nth-child(3) {
                animation-delay: 2.5s;
                opacity: 0;
            }
            .slider img:nth-child(4) {
                animation-delay: 3.75s;
                opacity: 0;
            }
        </style>
    </head>
    <body>
        <div class="slider">
            <img width="600" height="450" src="..\images\photo_2026-04-10_00-46-46.jpg" alt="Taekwondo" />
            <img width="600" height="450" src="..\images\photo_2026-04-10_00-46-46.jpg" alt="Taekwondo" />
            <img width="600" height="450" src="..\images\photo_2026-04-10_00-46-46.jpg" alt="Taekwondo" />
            <img width="600" height="450" src="..\images\photo_2026-04-10_00-46-46.jpg" alt="Taekwondo" />
        </div>

</html>
